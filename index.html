        <section id="como-funciona">
          <h2>O que é a Giro B2B</h2>
          <p>A Giro B2B é uma plataforma brasileira que conecta empresas fornecedoras e compradoras de diferentes setores da economia. Nosso objetivo é facilitar a descoberta de novos parceiros comerciais, a pesquisa entre opções e o relacionamento comercial entre empresas. A proposta é reduzir o tempo que hoje se gasta em canais fragmentados como buscas genéricas, indicações informais e grupos de mensagem.</p>
        </section>
        <section id="funcionalidades">
          <h2>Funcionalidades principais</h2>
          <ul>
            <li>Descoberta de fornecedores por categoria, região e tipo de produto</li>
            <li>Catálogo vivo para fornecedores apresentarem portfólio e diferenciais</li>
            <li>Comparação de opções com filtros e contexto de atividade</li>
            <li>Conformidade com a Lei Geral de Proteção de Dados (LGPD)</li>
          </ul>
        </section>
        <section id="sobre">
          <h2>Sobre a empresa</h2>
          <p>GIROB2B Plataforma de Negócios Digitais (Inova Simples). CNPJ: 65.542.877/0001-50. Fundada em março de 2026 no Brasil. Regime: Inova Simples, categoria de empresa de inovação prevista em legislação brasileira.</p>
          <h3>Equipe</h3>

        <section id="faq">
          <h2>Perguntas frequentes</h2>
          <h3>A plataforma já está no ar?</h3>
          <p>O produto está em construção. A landing atual é a fachada institucional enquanto a plataforma completa é desenvolvida. Lançamento previsto para 2026.</p>
          <h3>Quanto custa?</h3>
          <p>Compradores terão acesso gratuito. Fornecedores poderão se cadastrar gratuitamente e terão a opção de assinar planos com recursos adicionais, a serem detalhados no lançamento.</p>
          <h3>Quais setores a Giro B2B atende?</h3>
          <p>A Giro B2B é uma plataforma horizontal e atende empresas de diferentes setores da economia brasileira.</p>
