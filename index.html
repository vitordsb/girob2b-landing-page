        <section id="como-funciona">
          <h2>O que e a Giro B2B</h2>
          <p>A Giro B2B e uma plataforma brasileira que conecta empresas fornecedoras e compradoras de diferentes setores da economia. Nosso objetivo e facilitar a descoberta de novos parceiros comerciais, a pesquisa entre opcoes e o relacionamento comercial entre empresas. A proposta e reduzir o tempo que hoje se gasta em canais fragmentados como buscas genericas, indicacoes informais e grupos de mensagem.</p>
        </section>
        <section id="funcionalidades">
          <h2>Funcionalidades principais</h2>
          <ul>
            <li>Descoberta de fornecedores por categoria, regiao e tipo de produto</li>
            <li>Catalogo vivo para fornecedores apresentarem portfolio e diferenciais</li>
            <li>Comparacao de opcoes com filtros e contexto de atividade</li>
            <li>Conformidade com a Lei Geral de Protecao de Dados (LGPD)</li>
          </ul>
        </section>
        <section id="sobre">
          <h2>Sobre a empresa</h2>
          <p>GIROB2B Plataforma de Negocios Digitais (Inova Simples). CNPJ: 65.542.877/0001-50. Fundada em marco de 2026 no Brasil. Regime: Inova Simples, categoria de empresa de inovacao prevista em legislacao brasileira.</p>

        <section id="faq">
          <h2>Perguntas frequentes</h2>
          <h3>A plataforma ja esta no ar?</h3>
          <p>O produto esta em construcao. A landing atual e a fachada institucional enquanto a plataforma completa e desenvolvida. Lancamento previsto para 2026.</p>
          <h3>Quanto custa?</h3>
          <p>Compradores terao acesso gratuito. Fornecedores poderao se cadastrar gratuitamente e terao a opcao de assinar planos com recursos adicionais, a serem detalhados no lancamento.</p>
          <h3>Quais setores a Giro B2B atende?</h3>
          <p>A Giro B2B e uma plataforma horizontal e atende empresas de diferentes setores da economia brasileira.</p>
