        <section>
          <h2>Conectamos fornecedores e compradores no Brasil</h2>
          <p>A GiroB2B é um marketplace B2B horizontal que conecta fornecedores e compradores de todos os setores da economia brasileira. Fornecedores listam seus produtos gratuitamente e compradores enviam solicitações de cotação (RFQs) para encontrar os melhores parceiros comerciais.</p>
        </section>
        <section>
          <h2>O problema que resolvemos</h2>
          <p>O Brasil possui 24,2 milhões de empresas ativas, mas a busca por fornecedores ainda acontece por meios fragmentados: grupos de WhatsApp, buscas genéricas no Google, indicações pessoais e feiras presenciais. A GiroB2B centraliza esse processo em uma plataforma digital onde compradores encontram fornecedores verificados por categoria e localização.</p>
        </section>
        <section>
          <h2>Como funciona</h2>
          <h3>Para fornecedores</h3>
          <p>Cadastre sua empresa com CNPJ validado, liste seus produtos gratuitamente e sem limite, e receba solicitações de cotação de compradores interessados em todo o Brasil.</p>
          <h3>Para compradores</h3>
          <p>Busque fornecedores por categoria e localização, compare opções e envie solicitações de cotação para receber propostas. 100% gratuito para compradores.</p>
        </section>
        <section>
          <h2>Sobre a empresa</h2>
          <p>GiroB2B Plataforma de Negócios Digitais Inova Simples (I.S.) | CNPJ: 65.542.877/0001-50 | Fundada em março de 2026 | Regime: Inova Simples (empresa de inovação)</p>
          <p>Equipe: 3 co-founders dedicados à transformação digital do comércio B2B no Brasil.</p>
          <p>Contato: comercial@girob2b.com.br | Site: girob2b.com.br</p>
